services:
  cal-booking-app:
    container_name: cal-booking-app
    build:
      context: .
      dockerfile: Dockerfile
    init: true
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    environment:
      APP_HOST: ${APP_HOST:-localhost}
      APP_PORT: ${APP_PORT:-3000}
      NODE_ENV: ${NODE_ENV:-production}
      DATABASE_URL: ${DATABASE_URL:-file:/app/data/cal-booking.sqlite}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      SESSION_SECRET: ${SESSION_SECRET:-}
      SESSION_COOKIE_NAME: ${SESSION_COOKIE_NAME:-cal_booking_session}
    volumes:
      - cal-booking-data:/app/data
    expose:
      - "3000"
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - >-
          fetch("http://127.0.0.1:3000/api/health")
            .then(async (r) => {
              const j = await r.json();
              process.exit(r.ok && j.status === "ok" ? 0 : 1);
            })
            .catch(() => process.exit(1));
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
volumes:
  cal-booking-data:
